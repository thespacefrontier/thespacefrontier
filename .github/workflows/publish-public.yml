name: Публикация публичного релиза

concurrency:
  group: publish

on:
  workflow_dispatch:
  schedule:
  - cron: '0 2 * * *'

jobs:
  build:
    name: Сборка и публикация (public)
    runs-on: ubuntu-latest

    steps:
#    - name: Install dependencies
#      run: sudo apt-get install -y python3-paramiko python3-lxml

    - uses: actions/checkout@v4.2.2
      with:
        submodules: 'recursive'

    - name: Установка .NET
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x

    - name: Получить тег движка
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Восстановить зависимости
      run: dotnet restore

    - name: Сборка Content.Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Упаковка сервера
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64

    - name: Упаковка клиента
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Публикация версии
      run: Tools/publish_multi_request.py
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN_PUBLIC }}
        GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY }}
        FORK_ID: ${{ vars.FORK_ID_PUBLIC }}

