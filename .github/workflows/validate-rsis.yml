name: Валидатор RSI

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    paths:
      - '**.rsi/**'

jobs:
  validate_rsis:
    name: Проверка RSI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Инициализация субмодулей
        run: git submodule update --init
      # Corvax-Secrets-Start
      - name: Настройка секретов
        env:
          SSH_KEY: ${{ secrets.SECRETS_PRIVATE_KEY }}
        if: ${{ env.SSH_KEY != '' }}
        run: |
          mkdir ~/.ssh
          echo "${{ secrets.SECRETS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "HOST *" > ~/.ssh/config
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          git -c submodule.Secrets.update=checkout submodule update --init
      # Corvax-Secrets-End
      - name: Обновить зависимости движка
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Установить зависимости Python
        run: |
          pip3 install --ignore-installed --user pillow jsonschema
      - name: Проверить RSI
        run: |
          python3 RobustToolbox/Schemas/validate_rsis.py Resources/
