name: Сборка и публикация DocFX

on:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  docfx:
   name: Сборка документации DocFX
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4.2.2
    - name: Инициализация субмодулей
      run: |
        git submodule update --init --recursive
    - name: Обновить зависимости движка
      uses: space-wizards/submodule-dependency@v0.1.5
    - name: Обновить субмодули движка
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive
    - name: Установка .NET
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 10.0.x

    - name: Восстановить зависимости
      run: dotnet restore

    - name: Сборка проекта
      run: dotnet build --no-restore

    - name: Сборка DocFX
      uses: nikeee/docfx-action@v1.0.0
      with:
        args: Content.Docfx/docfx.json

    - name: Публикация документации на GitHub Pages
      uses: maxheld83/ghpages@master
      env:
        BUILD_DIR: Content.Docfx/_content-site
        GH_PAT: ${{ secrets.GH_PAT }}
