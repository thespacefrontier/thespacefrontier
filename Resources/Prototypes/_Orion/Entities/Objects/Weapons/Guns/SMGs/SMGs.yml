- type: entity
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponSubMachineGunVector
  name: Vector
  description: The Vector used by police special force.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/SMG/vector/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Orion/Objects/Weapons/Guns/SMG/vector/tiny.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Guns/SMG/vector/tiny.rsi
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -20
    angleIncrease: -3
  - type: Gun
    angleDecay: 30
    angleIncrease: 6
    minAngle: 22
    maxAngle: 35
    fireRate: 10
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/SMGs/vector_fire.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        startingItem: MagazineSMGVector
        insertSound: /Audio/_Orion/Weapons/Guns/SMGs/mp5_reload.ogg
        ejectSound: /Audio/_Orion/Weapons/Guns/SMGs/mp5_unload.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineSMGVector
      gun_chamber:
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponSubMachineGunP90
  name: P-90
  description: The P-90 is the EarthGov standard issue SMG. It's known for its compact size and ease of use inside the field. It's usually carried by troops who want a lightweight firearm to rush with.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/SMG/p90.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Orion/Objects/Weapons/Guns/SMG/p90.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Guns/SMG/p90.rsi
  - type: GunWieldBonus
    minAngle: -10
    maxAngle: -10
    angleIncrease: -2
  - type: Gun
    angleDecay: 30
    minAngle: 21
    maxAngle: 26
    fireRate: 7
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/SMGs/p90.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        startingItem: MagazineSMGP90
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineSMGP90
      gun_chamber:
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
