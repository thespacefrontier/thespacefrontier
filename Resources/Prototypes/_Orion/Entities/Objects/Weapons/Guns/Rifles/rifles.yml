# 5.45
- type: entity
  parent: [BaseWeaponRifle, BaseSecurityContraband]
  id: WeaponRifleFamas
  name: Famas
  description: A light, versatile assault rifle.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Guns/Rifles/famas/big.rsi
    scale: 0.9, 0.9
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Orion/Objects/Weapons/Guns/Rifles/famas/tiny.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Guns/Rifles/famas/tiny.rsi
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -43
    angleIncrease: -5
  - type: Gun
    angleDecay: 45
    angleIncrease: 15
    minAngle: 24
    maxAngle: 45
    burstFireRate: 14
    burstCooldown: 0.35
    fireRate: 4
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/Rifles/556rifle.ogg
    selectedMode: Burst
    availableModes:
      - SemiAuto
      - Burst
  - type: ItemSlots
    slots:
      gun_magazine:
        startingItem: MagazineRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/_Orion/Weapons/Guns/Rifles/556_unload.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifle
      gun_chamber:
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeRifle
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

