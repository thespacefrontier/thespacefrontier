  - type: Item
    sprite: _Orion/Objects/Weapons/Guns/Rifles/br-64/tiny.rsi
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -43
  - type: Gun
    fireRate: 2
    minAngle: 24
    cameraRecoilScalar: 4
    maxAngle: 45
    soundGunshot:
      path: /Audio/_Orion/Weapons/Guns/Snipers/tl127.ogg
